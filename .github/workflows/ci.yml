name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Security ──────────────────────────────────────────────────────────────
  secrets-scan:
    name: Security — Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  security-audit:
    name: Security — npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Audit API dependencies
        working-directory: api
        run: npm audit --audit-level=high --omit=dev
      - name: Audit Web dependencies
        working-directory: web
        run: npm audit --audit-level=high --omit=dev

  # ─── API ───────────────────────────────────────────────────────────────────
  api-lint:
    name: API — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w @judo-arena/api -- --max-warnings 0

  api-typecheck:
    name: API — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate
      - name: TypeScript check
        working-directory: api
        run: npx tsc --noEmit

  api-test:
    name: API — Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: judo
          POSTGRES_PASSWORD: judo_test
          POSTGRES_DB: judo_arena_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://judo:judo_test@localhost:5433/judo_arena_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET: test_refresh_secret_at_least_32_chars_long
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate
      - name: Run migrations
        working-directory: api
        run: npx prisma migrate deploy
      - name: Run tests with coverage
        working-directory: api
        run: npm run test:coverage -- --reporter=verbose

  api-test-db:
    name: API — DB Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: judo
          POSTGRES_PASSWORD: judo_test
          POSTGRES_DB: judo_arena_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://judo:judo_test@localhost:5433/judo_arena_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET: test_refresh_secret_at_least_32_chars_long
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate
      - name: Run migrations
        working-directory: api
        run: npx prisma migrate deploy
      - name: Run DB integration tests
        working-directory: api
        run: npm run test:db -- --reporter=verbose

  api-build:
    name: API — Build
    runs-on: ubuntu-latest
    needs: [api-lint, api-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate
      - name: Build
        working-directory: api
        run: npm run build

  # ─── WEB ───────────────────────────────────────────────────────────────────
  web-lint:
    name: Web — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w tanstack_start_ts

  web-typecheck:
    name: Web — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit

  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    needs: [web-lint, web-typecheck]
    env:
      VITE_API_URL: https://api.judo-arena.kz
      VITE_WS_URL: wss://api.judo-arena.kz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build -w tanstack_start_ts
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  # ─── E2E ───────────────────────────────────────────────────────────────────
  e2e:
    name: E2E — Smoke Tests
    runs-on: ubuntu-latest
    needs: [api-test, api-test-db, web-build]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: judo
          POSTGRES_PASSWORD: judo_e2e
          POSTGRES_DB: judo_arena_e2e
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://judo:judo_e2e@localhost:5433/judo_arena_e2e
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: e2e_access_secret_at_least_32_chars_long_x
      JWT_REFRESH_SECRET: e2e_refresh_secret_at_least_32_chars_long_x
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      NODE_ENV: development
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:8080
      APP_URL: http://localhost:8080
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:4000
      AUTH_LOGIN_RATE_LIMIT_MAX: 100

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate

      - name: Run migrations
        working-directory: api
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: api
        run: npx tsx prisma/seed.ts

      # Build and start API first so the frontend can proxy to it during dev startup
      - name: Build API
        working-directory: api
        run: npm run build

      - name: Start API server
        working-directory: api
        run: node dist/server.js &

      - name: Wait for API to be ready
        run: npx wait-on http://localhost:4000/health --timeout 30000 --interval 1000

      # Start frontend dev server after API is confirmed up
      - name: Start web dev server
        run: npm run dev -w tanstack_start_ts -- --host 0.0.0.0 --port 8080 &

      - name: Wait for web to be ready
        run: npx wait-on http://localhost:8080 --timeout 120000 --interval 2000

      - name: Run E2E smoke tests
        run: npx playwright test e2e/smoke.test.ts --reporter=github
        env:
          BASE_URL: http://localhost:8080
          API_URL: http://localhost:4000

      - name: Run a11y tests
        run: npx playwright test e2e/a11y.test.ts --reporter=github
        env:
          BASE_URL: http://localhost:8080
          API_URL: http://localhost:4000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Bundle size ───────────────────────────────────────────────────────────
  bundle-size:
    name: Web — Bundle Size
    runs-on: ubuntu-latest
    needs: [web-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/
      - name: Check bundle size limits
        run: node scripts/check-bundle-size.mjs

  # ─── OpenAPI artifact ──────────────────────────────────────────────────────
  openapi:
    name: API — Generate OpenAPI spec
    runs-on: ubuntu-latest
    needs: [api-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate
      - name: Build API
        working-directory: api
        run: npm run build
      - name: Generate OpenAPI spec
        run: node scripts/generate-openapi.mjs api/openapi.json
      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: api/openapi.json
          retention-days: 30
