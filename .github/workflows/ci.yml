name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── API ───────────────────────────────────────────────────────────────────
  api-lint:
    name: API — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w @judo-arena/api -- --max-warnings 0

  api-typecheck:
    name: API — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx --prefix api tsc --noEmit

  api-test:
    name: API — Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: judo
          POSTGRES_PASSWORD: judo_test
          POSTGRES_DB: judo_arena_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://judo:judo_test@localhost:5433/judo_arena_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET: test_refresh_secret_at_least_32_chars_long
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate
      - name: Run migrations
        working-directory: api
        run: npx prisma migrate deploy
      - name: Run tests
        working-directory: api
        run: npm test -- --reporter=verbose

  api-build:
    name: API — Build
    runs-on: ubuntu-latest
    needs: [api-lint, api-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build -w @judo-arena/api

  # ─── WEB ───────────────────────────────────────────────────────────────────
  web-typecheck:
    name: Web — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx --prefix web tsc --noEmit

  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    needs: [web-typecheck]
    env:
      VITE_API_URL: https://api.judo-arena.kz
      VITE_WS_URL: wss://api.judo-arena.kz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build -w tanstack_start_ts
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7
