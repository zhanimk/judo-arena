services:
  # ── API (Node.js) ─────────────────────────────────────────
  - type: web
    name: judo-arena-api
    runtime: node
    region: frankfurt
    plan: free

    buildCommand: npm ci && npm run prisma:generate -w api && npm run build -w api && npm run prisma:migrate:deploy -w api
    startCommand: npm start -w api

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.1
      - key: API_PORT
        value: "10000"

      - key: DATABASE_URL
        fromDatabase:
          name: judo-arena-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: judo-arena-redis
          type: keyvalue
          property: connectionString

      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d

      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false

      - key: EMAIL_FROM
        sync: false # Установите в настройках Render: "Judo-Arena <noreply@yourdomain.com>"

      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW
        value: "1 minute"
      - key: SOCKET_CONNECTION_LIMIT_MAX
        value: "120"
      - key: SOCKET_CONNECTION_LIMIT_WINDOW_SEC
        value: "60"

      # Observability
      - key: APP_VERSION
        fromMetadata: commitSHA

      # Backup
      - key: BACKUP_CRON
        value: "0 2 * * *"
      - key: BACKUP_RETAIN_DAYS
        value: "30"
      - key: BACKUP_SCHEDULER_ENABLED
        value: "false"
      - key: BACKUP_TRIGGER_SECRET
        sync: false

      # Persistent object storage. Keep documents/backups outside the public bucket.
      - key: S3_BUCKET
        sync: false
      - key: S3_PRIVATE_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1

  # ── Backup Cron Job ───────────────────────────────────────
  - type: cron
    name: judo-backup
    runtime: docker
    region: frankfurt
    plan: starter
    schedule: "0 2 * * *" # 02:00 UTC ежедневно
    dockerfilePath: ./api/Dockerfile.backup
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: judo-arena-db
          property: connectionString
      - key: S3_PRIVATE_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: BACKUP_RETAIN_DAYS
        value: "30"

  # ── Key Value (Redis-compatible) ─────────────────────────
  - type: keyvalue
    name: judo-arena-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru

# ── PostgreSQL ─────────────────────────────────────────────
databases:
  - name: judo-arena-db
    region: frankfurt
    plan: free
