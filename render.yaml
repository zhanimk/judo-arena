services:
  # ── API (Node.js) ─────────────────────────────────────────
  - type: web
    name: judo-arena-api
    runtime: node
    region: frankfurt
    plan: free

    rootDir: api
    buildCommand: npm ci && npm run build
    startCommand: npm start

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: judo-arena-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: judo-arena-redis
          type: redis
          property: connectionString

      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d

      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false

      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Judo-Arena <onboarding@resend.dev>"

      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW
        value: "1 minute"
      - key: SOCKET_CONNECTION_LIMIT_MAX
        value: "120"
      - key: SOCKET_CONNECTION_LIMIT_WINDOW_SEC
        value: "60"
      # S3 storage for uploads — set these in Render Dashboard → Environment
      # Without S3, uploaded files are lost on each deploy (ephemeral filesystem)
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      # Observability
      - key: SENTRY_DSN
        sync: false
      - key: APP_VERSION
        fromMetadata: commitSHA

  # ── Redis ─────────────────────────────────────────────────
  - type: redis
    name: judo-arena-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru

# ── PostgreSQL ─────────────────────────────────────────────
databases:
  - name: judo-arena-db
    region: frankfurt
    plan: free
