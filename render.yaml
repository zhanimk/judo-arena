services:
  # ── API (Node.js) ─────────────────────────────────────────
  - type: web
    name: judo-arena-api
    runtime: node
    region: frankfurt
    plan: free

    buildCommand: npm ci && npm run prisma:generate -w api && npm run build -w api && npm run prisma:migrate:deploy -w api
    startCommand: npm start -w api

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "10000"

      - key: DATABASE_URL
        fromDatabase:
          name: judo-arena-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: judo-arena-redis
          type: redis
          property: connectionString

      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d

      - key: CORS_ORIGIN
        value: https://judo-arena.vercel.app
      - key: APP_URL
        value: https://judo-arena.vercel.app

      - key: EMAIL_FROM
        value: "Judo-Arena <onboarding@resend.dev>"

      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW
        value: "1 minute"
      - key: SOCKET_CONNECTION_LIMIT_MAX
        value: "120"
      - key: SOCKET_CONNECTION_LIMIT_WINDOW_SEC
        value: "60"

      # Observability
      - key: APP_VERSION
        fromMetadata: commitSHA

  # ── Redis ─────────────────────────────────────────────────
  - type: redis
    name: judo-arena-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru

# ── PostgreSQL ─────────────────────────────────────────────
databases:
  - name: judo-arena-db
    region: frankfurt
    plan: free
